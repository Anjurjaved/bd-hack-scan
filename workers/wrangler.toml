name = "bd-hack-audit-api"
main = "src/index.js"
compatibility_date = "2026-01-01"
workers_dev = true

# Every minute: scan a small batch of unscanned domains (the Worker cron scan engine).
# Every 15 min: housekeeping. Every 20 min: reverse-IP harvest (BD firehose). Every 3h: crt.sh .bd.
[triggers]
crons = ["* * * * *", "*/15 * * * *", "*/20 * * * *", "13 */3 * * *"]

# The live dashboard is served as static assets by this same Worker.
# Static files (index.html, config.js, fonts) are served first; any path
# without a matching file (/api/*, /claim, /ingest, …) falls through to the Worker.
[assets]
directory = "../dashboard"

[[d1_databases]]
binding = "DB"
database_name = "bd-hack-audit"
database_id = "5a01635e-b9fe-4b28-a684-ba7007118f2a"

# SHARED_TOKEN is set as a secret (not here):  wrangler secret put SHARED_TOKEN
# It authorizes the scanner + harvester (write endpoints). Dashboard reads are public.
[vars]
BATCH_SIZE = "1000"
SCAN_PER_TICK = "4"
GROQ_MODEL = "llama-3.1-8b-instant"
