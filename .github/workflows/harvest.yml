name: harvest

# FREE Bangladesh-business-domain harvesters (+ paced top-global feeder) → scanner queue.
# Sources run on STAGGERED crons (minutes offset, never :00 UTC) so they never collide.
# BD sources run first/most-often; the global-ranked feeder runs twice daily, bounded,
# to respect Cloudflare D1's 100k-rows-written/day free cap.

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Which harvester(s) to run"
        type: choice
        default: all
        options:
          - all
          - crtsh
          - directories
          - osm
          - reverse-ip
          - lead-coip
          - global
  schedule:
    - cron: "17 */2 * * *"   # crt.sh — the .bd firehose — every ~2h
    - cron: "37 */3 * * *"   # directories (Website-field) — every ~3h
    - cron: "53 4 * * *"     # OpenStreetMap (Overpass) — daily
    - cron: "7 */6 * * *"    # reverse-IP on BD hosting ASNs — every ~6h
    - cron: "43 */4 * * *"   # lead-coip — co-hosted neighbours of confirmed hacks — every ~4h
    - cron: "27 1,13 * * *"  # top-ranked GLOBAL feeder — twice daily, paced

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCHED_CRTSH: "17 */2 * * *"
      SCHED_DIRECTORIES: "37 */3 * * *"
      SCHED_OSM: "53 4 * * *"
      SCHED_REVERSE_IP: "7 */6 * * *"
      SCHED_LEAD_COIP: "43 */4 * * *"
      SCHED_GLOBAL: "27 1,13 * * *"
    concurrency:
      group: harvest-${{ github.event.schedule || github.event.inputs.source || 'all' }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r harvester/requirements.txt
      - name: Decide which source(s) to run
        id: pick
        env:
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_SOURCE: ${{ github.event.inputs.source }}
        run: |
          set -euo pipefail
          if [ -n "${SCHEDULE:-}" ]; then
            case "$SCHEDULE" in
              "$SCHED_CRTSH")       SOURCE=crtsh ;;
              "$SCHED_DIRECTORIES") SOURCE=directories ;;
              "$SCHED_OSM")         SOURCE=osm ;;
              "$SCHED_REVERSE_IP")  SOURCE=reverse-ip ;;
              "$SCHED_LEAD_COIP")   SOURCE=lead-coip ;;
              "$SCHED_GLOBAL")      SOURCE=global ;;
              *)                    SOURCE=all ;;
            esac
          else
            SOURCE="${INPUT_SOURCE:-all}"
          fi
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Selected source: $SOURCE"
      - name: Run harvester(s)
        env:
          API_BASE: ${{ secrets.API_BASE }}
          SHARED_TOKEN: ${{ secrets.SHARED_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -uo pipefail
          run_one() {
            local name="$1" file
            case "$name" in
              crtsh)       file=harvester/crtsh.py ;;
              directories) file=harvester/directories.py ;;
              osm)         file=harvester/osm.py ;;
              reverse-ip)  file=harvester/reverse_ip.py ;;
              lead-coip)   file=harvester/lead_coip.py ;;
              global)      file=harvester/global_feeder.py ;;
              *) echo "Unknown source: $name" >&2; return 1 ;;
            esac
            echo "::group::Running $name ($file)"
            python "$file" || echo "$name exited non-zero (handled)"
            echo "::endgroup::"
          }
          SRC="${{ steps.pick.outputs.source }}"
          if [ "$SRC" = "all" ]; then
            # BD sources first, then a bounded global chunk
            for s in crtsh directories osm reverse-ip lead-coip global; do run_one "$s"; done
          else
            run_one "$SRC"
          fi
